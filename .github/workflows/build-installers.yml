name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements2.txt
          pip install pyinstaller

      - name: Build app with PyInstaller
        run: |
          pyinstaller packaging/pyinstaller/pointer.spec --noconfirm --clean

      - name: Build DMG
        run: |
          chmod +x packaging/macos/create_dmg.sh
          packaging/macos/create_dmg.sh "dist/Pointer.app" "dist/Pointer.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pointer-macos-unsigned
          path: |
            dist/Pointer.app
            dist/Pointer.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements2.txt
          pip install pyinstaller

      - name: Build app with PyInstaller
        shell: pwsh
        run: |
          pyinstaller packaging/pyinstaller/pointer.spec --noconfirm --clean

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "packaging/windows/pointer.iss"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pointer-windows-unsigned
          path: |
            dist/Pointer
            dist/Pointer-Setup.exe
