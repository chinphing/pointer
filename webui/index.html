<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Agent Zero</title>
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="components/messages/action-buttons/simple-action-buttons.css">
    <link rel="stylesheet" href="components/messages/process-group/process-group.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/speech.css">
    <link rel="stylesheet" href="css/scheduler-datepicker.css">
    <link rel="stylesheet" href="css/scheduler.css">
    <link rel="stylesheet" href="css/notification.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/tables.css">

    <!-- Flatpickr for datetime picker -->
    <link rel="stylesheet" href="vendor/flatpickr/flatpickr.min.css">
    <script src="vendor/flatpickr/flatpickr.min.js"></script>

    <script>
        globalThis.safeCall = function (name, ...args) {
            if (window[name]) window[name](...args)
        }
    </script>

    <script type="module" src="index.js"></script>

    <!-- Bootstrap JS (only for logic, importing bundled CSS => UI conflicts) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Then load Alpine.js -->
    <!-- <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script> -->
    <script type="module" src="js/initFw.js"></script>

    <script src="vendor/ace-min/ace.js"></script>
    <link href="vendor/ace-min/ace.min.css" rel="stylesheet">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="vendor/katex/katex.min.css" crossorigin="anonymous">

    <!-- KaTeX javascript -->
    <script defer src="vendor/katex/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="vendor/katex/katex.auto-render.min.js" crossorigin="anonymous"></script>

    <!-- QR Code Library -->
    <script src="vendor/qrcode.min.js"></script>

    <!-- Google Icons -->
    <link rel="stylesheet" href="vendor/google/google-icons.css" />

    <!-- Link the PWA manifest file -->
    <link rel="manifest" href="js/manifest.json">

    <script>
        // Expose git info for sidebar component
        globalThis.gitinfo = { version: "{{version_no}}", commit_time: "{{version_time}}" };

        // Expose runtime info for frontend components (development gating, runtime-scoped cookies).
        globalThis.runtimeInfo = {
            ...(globalThis.runtimeInfo || {}),
            id: "{{runtime_id}}",
            isDevelopment: "{{runtime_is_development}}" === "true",
            loggedIn: "{{logged_in}}" === "true",
        };
    </script>
</head>

<body class="dark-mode device-pointer" x-data>
    <div class="container">
        <!-- Sidebar Overlay -->
        <div id="sidebar-overlay" x-data>
            <template x-if="$store.sidebar">
                <div class="sidebar-overlay" :class="{'visible': $store.sidebar.isOpen && $store.sidebar.isMobile()}" @click="$store.sidebar.close()"></div>
            </template>
        </div>
        <!-- Left Sidebar (Header Icons, Quick Actions, Tabs, Chats, Tasks) -->
        <x-component path="sidebar/left-sidebar.html"></x-component>

        <!-- Right Panel: when screenshot column visible, input spans full bottom; collapsed class for layout -->
        <div id="right-panel" class="panel right-panel-with-screenshot"
             :class="{
               'has-screenshot-column': $store.computerScreen,
               'screenshot-column-collapsed': $store.computerScreen && !$store.computerScreen.screenshotPanelVisible
             }">
            <!-- Top: row of chat + screenshot; when screenshot collapsed, chat expands -->
            <div class="right-panel-top">
                <div id="chat-area" class="chat-area">
                    <x-component path="chat/top-section/chat-top.html"></x-component>
                    <div x-data x-show="$store.welcomeStore && $store.welcomeStore.isVisible">
                        <x-component path="welcome/welcome-screen.html"></x-component>
                    </div>
                    <div id="chat-history" x-data x-show="!$store.welcomeStore || !$store.welcomeStore.isVisible"></div>
                    <div style="position: relative; height: 0;">
                        <x-component path="notifications/notification-toast-stack.html"></x-component>
                    </div>
                    <div id="toast" class="toast">
                        <div class="toast__content">
                            <div class="toast__title"></div>
                            <div class="toast__separator"></div>
                            <div class="toast__message"></div>
                        </div>
                        <button class="toast__copy" style="display: none;">Copy</button>
                        <button class="toast__close">Close</button>
                    </div>
                </div>

                <!-- Screenshot column only (no input here when has-screenshot-column; input is in right-panel-bottom) -->
                <div class="screenshot-and-input-column" x-show="$store.computerScreen">
                    <div id="screenshot-panel" class="screenshot-panel" x-data
                         :class="{ 'screenshot-panel--collapsed': $store.computerScreen && !$store.computerScreen.screenshotPanelVisible }">
                        <div class="screenshot-panel__header">
                            <span class="screenshot-panel__title">原始截图</span>
                            <button type="button" class="screenshot-panel__toggle"
                                    @click="$store.computerScreen.toggleScreenshotPanel()"
                                    :title="$store.computerScreen.screenshotPanelVisible ? '收起' : '展开'"
                                    x-text="$store.computerScreen.screenshotPanelVisible ? '◀' : '▶'"></button>
                        </div>
                        <div class="screenshot-panel__body" x-show="$store.computerScreen.screenshotPanelVisible"
                             x-data="screenshotWithCursor()" x-init="init()">
                            <div class="screenshot-panel__img-wrap" x-show="$store.computerScreen.computerScreenRaw">
                                <img x-show="$store.computerScreen.computerScreenRaw"
                                     :src="$store.computerScreen.computerScreenRaw"
                                     alt="Screen capture"
                                     class="screenshot-panel__img"
                                     @load="onImgLoad($event)" />
                                <img class="screenshot-panel__cursor" x-show="cursorVisible" :style="cursorStyle" aria-hidden="true" src="/public/cursor-pointer.svg" alt="" />
                            </div>
                            <div x-show="!$store.computerScreen.computerScreenRaw" class="screenshot-panel__placeholder">暂无截图</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom: full-width input (spans chat + screenshot when both present); hidden on welcome screen -->
            <div class="right-panel-bottom" x-show="!$store.welcomeStore || !$store.welcomeStore.isVisible">
                <x-component path="chat/input/progress.html"></x-component>
                <x-component path="chat/input/chat-bar.html"></x-component>
            </div>
        </div>
                        </div>

    <!-- Drag and Drop Overlay Component -->
    <x-component path="chat/attachments/dragDropOverlay.html"></x-component>

    <!-- Register Service Worker for offline support and caching -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('js/sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>

</body>

</html>
